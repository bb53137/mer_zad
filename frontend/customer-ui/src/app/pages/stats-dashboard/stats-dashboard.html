<div class="page">
  <h1>Korisnici statistika</h1>

  <a routerLink="/customers">Nazad na korisnike</a>

  <div *ngIf="loading">Učitavanje...</div>

  <div *ngIf="!loading && !stats">
    Nema podataka za prikaz.
  </div>

  <div *ngIf="!loading && stats as data" class="cards">
    <div class="card">
      <h3>Ukupno</h3>
      <p>{{ data.totalCount }}</p>
    </div>

    <div class="card">
      <h3>Aktivano</h3>
      <p>{{ data.activeCount }}</p>
    </div>

    <div class="card">
      <h3>Neaktivno</h3>
      <p>{{ data.inactiveCount }}</p>
    </div>
  </div>

  <div *ngIf="!loading && stats as data" class="top-cities">
    <h2>Top 5 gradova</h2>
    <ol>
      <li *ngFor="let city of data.topCities">
        {{ city.city }} - {{ city.count }}
      </li>
    </ol>
  </div>
</div>
